datasets:
  - name: PatagoniaMet
    doi: 10.5281/zenodo.7992760
    year: 2023
    description: A multi-source hydrometeorological dataset for Western Patagonia (40–56°S). Includes precipitation, temperature, streamflow, and other variables from multiple observational sources.
    extra: ">3k on Zenodo"

  - name: RGI v7.1 Lake Termini Classification
    doi: 10.5281/zenodo.15524733
    year: 2025
    description: Global mapping of lake-terminating glaciers — classification of Randolph Glacier Inventory v7.1 glacier termini as lake-terminating or not.

  - name: Historical and Future Runoff in Western Patagonia
    doi: 10.5281/zenodo.15076803
    year: 2025
    description: Simulated historical and future runoff projections for Western Patagonia using hybrid glacio-hydrological modelling.

  - name: Glacier Runoff Projections in Patagonia
    doi: 10.5281/zenodo.8384882
    year: 2024
    description: Ensemble of glacier runoff projections for the Patagonian Andes (40–56°S) under multiple climate scenarios.

  - name: Model-Based Runoff in Northern Patagonia
    doi: 10.5281/zenodo.10949518
    year: 2024
    description: Hydrological model outputs for Northern Patagonia catchments under historical and future climate conditions.

