project:
  type: website
  output-dir: _site

website:
  title: "Rodrigo Aguayo"
  description: "Mountain Hydrology — Glaciology, Hydrology, Deep Learning for Earth Systems"
  site-url: https://rodaguayo.github.io
  repo-url: https://github.com/rodaguayo/rodaguayo.github.io
  repo-actions: [edit, issue]

  navbar:
    collapse-below: lg
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: cv.qmd
        text: CV
      - href: publications.qmd
        text: Publications
      - href: teaching.qmd
        text: Teaching
      - href: talks.qmd
        text: Talks
      - href: datasets.qmd
        text: Datasets
      - href: open-science.qmd
        text: Open Science
      - href: blog/index.qmd
        text: Blog
      - href: contact.qmd
        text: Contact
    right: []

  page-footer:
    center: |
      © 2026 Rodrigo Aguayo &middot;
      [GitHub](https://github.com/rodaguayo) &middot;
      [Bluesky](https://bsky.app/profile/rodaguayo.bsky.social)

  search: true
  open-graph: true
  twitter-card: true
  favicon: assets/favicon.svg

format:
  html:
    theme: default
    css: assets/styles.css
    toc: true
    toc-location: right
    toc-depth: 3
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    link-external-icon: true
    html-math-method: katex
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
          <meta name="google-site-verification" content="bKGvb6Bjj0jTlBEnNaAFW_FU8ypt8FxYfXCBiCkUaJM">
          <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "10e4b4f51e554d4ebb60539ab4626192"}'></script>


    include-after-body:
      - assets/theme-toggle.js


